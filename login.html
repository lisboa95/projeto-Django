<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Gestão de Cursos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 450px;
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .logo-icon {
            font-size: 3.5rem;
            color: #4a6ee0;
            margin-bottom: 1rem;
            display: inline-block;
        }
        
        .logo h1 {
            color: #2c3e50;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(45deg, #4a6ee0, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .logo p {
            color: #7f8c8d;
            font-size: 0.95rem;
        }
        
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            border: 1px solid #f5c6cb;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: shake 0.5s;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .alert-error::before {
            content: "⚠️";
            font-size: 1.2rem;
        }
        
        .form-group {
            margin-bottom: 1.8rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.8rem;
            color: #2c3e50;
            font-weight: 600;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
            background: #f8f9fa;
        }
        
        .form-group input:focus {
            border-color: #4a6ee0;
            outline: none;
            background: white;
            box-shadow: 0 0 0 3px rgba(74, 110, 224, 0.1);
        }
        
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, #4a6ee0, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 0.5rem;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(74, 110, 224, 0.3);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .links {
            margin-top: 2rem;
            text-align: center;
            padding-top: 1.5rem;
            border-top: 1px solid #eee;
        }
        
        .links a {
            color: #4a6ee0;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        .links a:hover {
            color: #764ba2;
            text-decoration: underline;
        }
        
        .test-credentials {
            margin-top: 2rem;
            padding: 1.5rem;
            background: #f0f8ff;
            border-radius: 12px;
            border: 2px solid #d0e8ff;
        }
        
        .test-credentials h4 {
            color: #2c3e50;
            margin-bottom: 1rem;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .test-credentials h4::before {
            content: "👑";
        }
        
        .credential-item {
            margin-bottom: 0.8rem;
        }
        
        .credential-item:last-child {
            margin-bottom: 0;
        }
        
        .credential-item label {
            display: block;
            font-weight: 600;
            color: #555;
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
        }
        
        .credential-item code {
            background: #2c3e50;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9rem;
            display: inline-block;
            width: 100%;
            box-sizing: border-box;
        }
        
        .note {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #7f8c8d;
            font-style: italic;
            text-align: center;
        }
        
        /* Responsividade */
        @media (max-width: 480px) {
            .login-container {
                padding: 1.5rem;
            }
            
            .logo h1 {
                font-size: 1.5rem;
            }
            
            .form-group input {
                padding: 12px;
            }
            
            .btn-login {
                padding: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">📚</div>
            <h1>Sistema de Gestão de Cursos</h1>
            <p>Entre com suas credenciais para acessar o sistema</p>
        </div>
        
        {% if form.errors %}
        <div class="alert-error">
            Usuário ou senha incorretos. Por favor, tente novamente.
        </div>
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="username">Nome de Usuário</label>
                <input type="text" 
                       id="username" 
                       name="username" 
                       required 
                       autofocus
                       placeholder="Digite seu nome de usuário"
                       value="{% if form.username.value %}{{ form.username.value }}{% endif %}">
            </div>
            
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" 
                       id="password" 
                       name="password" 
                       required
                       placeholder="Digite sua senha">
            </div>
            
            <button type="submit" class="btn-login">
                <span>🔐</span>
                <span>Entrar no Sistema</span>
            </button>
            
            {% if next %}
                <input type="hidden" name="next" value="{{ next }}">
            {% endif %}
        </form>
        
        <div class="links">
            <a href="/">
                <span>←</span>
                <span>Voltar para a página inicial</span>
            </a>
        </div>
        
        <!-- Removido o bloco de credenciais de teste -->
        <!-- <div class="test-credentials">
            <h4>Credenciais para Demonstração</h4>
            <div class="credential-item">
                <label>Administrador:</label>
                <code>admin</code>
            </div>
            <div class="credential-item">
                <label>Senha:</label>
                <code>123</code>
            </div>
            <p class="note">Use estas credenciais apenas para testes de demonstração.</p>
        </div> -->
    </div>

    <script>
        // Foco automático no campo de usuário
        document.getElementById('username').focus();
        
        // Animação suave ao enviar o formulário
        document.querySelector('form').addEventListener('submit', function(e) {
            const button = document.querySelector('.btn-login');
            button.innerHTML = '<span>⏳</span><span>Entrando...</span>';
            button.disabled = true;
        });
        
        // Mostrar/ocultar senha (opcional - para versões futuras)
        // document.getElementById('togglePassword').addEventListener('click', function() {
        //     const passwordInput = document.getElementById('password');
        //     const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        //     passwordInput.setAttribute('type', type);
        //     this.textContent = type === 'password' ? '👁️' : '👁️‍🗨️';
        // });
    </script>
</body>
</html>
